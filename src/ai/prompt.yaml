            - "Do not use @property or @abstractproperty"
            - arguments:
                - "Never use * to use named argumants. I hate this"
                - "Do not break method argument lists into multiple lines and leave the method return value type hinting in  the same line in method signiture"
        - "Always use OOP and design patterns in generating code. I hate procedural coding"
        - conditions:
            - |
              Do not use single line assignments such as 
              my_var = true_value if true_value else false_value
              instead use
              if condition:
                my_var = true_value
              else:
                my_var = false_value
